apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundz-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: roundz-gateway
  template:
    metadata:
      labels:
        app: roundz-gateway
    spec:
      containers:
        - name: gateway
          image: roundz/gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: roundz-secrets
            - configMapRef:
                name: roundz-config
---
apiVersion: v1
kind: Service
metadata:
  name: roundz-gateway
spec:
  selector:
    app: roundz-gateway
  ports:
    - port: 80
      targetPort: 3000
