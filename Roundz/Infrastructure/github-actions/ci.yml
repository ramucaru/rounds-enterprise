name: Roundz CI
on:
  pull_request:
  push:
    branches: [main, development-base-1]
jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Roundz/package-lock.json
      - run: npm ci
        working-directory: Roundz
      - run: npm test
        working-directory: Roundz
      - run: npm run build
        working-directory: Roundz
