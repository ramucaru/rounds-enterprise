apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundz-gateway
spec:
  replicas: 2
  selector:
    matchLabels: { app: roundz-gateway }
  template:
    metadata:
      labels: { app: roundz-gateway }
    spec:
      containers:
        - name: gateway
          image: ghcr.io/roundz/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef: { name: roundz-runtime }
---
apiVersion: v1
kind: Service
metadata:
  name: roundz-gateway
spec:
  selector: { app: roundz-gateway }
  ports:
    - port: 80
      targetPort: 8080
